services:
  tdarr-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: tdarr-mcp:local
    restart: unless-stopped
    ports:
      - ${MCP_PORT:-8000}:8000
    environment:
      TDARR_URL: ${TDARR_URL:-http://host.docker.internal:8265}
      TDARR_API_KEY: ${TDARR_API_KEY:-}
      TDARR_API_KEY_HEADER: ${TDARR_API_KEY_HEADER:-X-API-Key}
      TDARR_TIMEOUT: ${TDARR_TIMEOUT:-30}
